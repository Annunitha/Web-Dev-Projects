<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Private Journal</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<div class="mesh-bg"></div>

<!-- Lock Screen -->
<div id="lockScreen">
    <div class="glass-card" style="text-align: center;">
        <h2 id="lockTitle">Welcome Back</h2>
        <p id="lockDesc" style="color: var(--text-muted); font-size: 0.9rem;">Enter password to unlock your journal</p>
        <input type="password" id="passwordInput" placeholder="Password">
        <button onclick="handleUnlock()" id="unlockBtn">Unlock</button>
    </div>
</div>

<!-- Main Content -->
<div class="container hidden" id="mainContent">
    <div class="header">
        <h1 style="margin: 0;">My Diary</h1>
        <div style="display: flex; gap: 10px;">
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
            <button onclick="lockJournal()" style="background: rgba(251, 113, 133, 0.2); color: #fb7185;">Lock</button>
        </div>
    </div>

    <!-- Search -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search entries..." oninput="renderEntries()">
    </div>

    <!-- New Entry -->
    <div class="glass-card">
        <h3>New Entry</h3>
        <input type="text" id="newTitle" placeholder="Title">
        <textarea id="newContent" rows="4" placeholder="How was your day?"></textarea>
        <div class="mood-selector" id="moodSelector">
            <button class="mood-btn" type="button" onclick="selectMood('😊', this)">😊</button>
            <button class="mood-btn" type="button" onclick="selectMood('😔', this)">😔</button>
            <button class="mood-btn" type="button" onclick="selectMood('😠', this)">😠</button>
            <button class="mood-btn" type="button" onclick="selectMood('😴', this)">😴</button>
            <button class="mood-btn" type="button" onclick="selectMood('✨', this)">✨</button>
        </div>
        <button type="button" onclick="saveEntry()" style="width: 100%; margin-top: 10px;">Save Entry</button>
    </div>

    <div id="entriesList"></div>
</div>
</body>
</html>
