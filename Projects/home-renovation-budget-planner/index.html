<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Renovation Budget Planner</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🏗️ RenoPlanner</h2>
                <button id="themeToggle" class="btn-icon" aria-label="Toggle Theme">🌙</button>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" id="navDashboard">Dashboard</a>
                <a href="#" class="nav-item" id="navExpenses">Expenses</a>
            </nav>

            <div class="project-info panel">
                <h3>Current Project</h3>
                <input type="text" id="projectName" placeholder="Enter project name..." value="My Home Renovation">
                <div class="budget-input">
                    <label>Total Budget ($)</label>
                    <input type="number" id="totalBudget" value="50000" min="0">
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <h1>Budget Dashboard</h1>
                <button id="addExpenseBtn" class="btn btn-primary">+ Add Expense</button>
            </header>

            <div class="dashboard-grid" id="dashboardView">
                <!-- Overview Cards -->
                <div class="overview-cards">
                    <div class="card summary-card">
                        <h3>Total Budget</h3>
                        <div class="amount text-primary" id="displayTotalBudget">$0</div>
                    </div>
                    <div class="card summary-card">
                        <h3>Total Spent</h3>
                        <div class="amount text-danger" id="displayTotalSpent">$0</div>
                    </div>
                    <div class="card summary-card">
                        <h3>Remaining</h3>
                        <div class="amount text-success" id="displayRemaining">$0</div>
                    </div>
                </div>

                <!-- Progress Bar -->
                <div class="card progress-card">
                    <h3>Budget Utilization</h3>
                    <div class="progress-container">
                        <div class="progress-bar" id="budgetProgressBar"></div>
                    </div>
                    <div class="progress-text" id="budgetProgressText">0% Used</div>
                </div>

                <!-- Category Breakdown -->
                <div class="card category-card">
                    <h3>Spending by Category</h3>
                    <div class="category-list" id="categoryBreakdown">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Expenses View (Hidden by default) -->
            <div class="expenses-view hidden" id="expensesView">
                <div class="card">
                    <h3>Expense History</h3>
                    <div class="table-container">
                        <table class="expense-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Description</th>
                                    <th>Category</th>
                                    <th>Amount</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="expenseTableBody">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                        <div id="noExpensesMsg" class="empty-state">No expenses added yet.</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Expense Modal -->
    <div class="modal-overlay hidden" id="expenseModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Add New Expense</h2>
                <button id="closeModalBtn" class="btn-icon">×</button>
            </div>
            <form id="expenseForm">
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="expDesc" required placeholder="e.g. Living room paint">
                </div>
                <div class="form-group">
                    <label>Amount ($)</label>
                    <input type="number" id="expAmount" required min="0.01" step="0.01">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="expCategory" required>
                        <option value="Interior Design">Interior Design</option>
                        <option value="Painting">Painting</option>
                        <option value="Flooring">Flooring</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Plumbing">Plumbing</option>
                        <option value="Electrical">Electrical Work</option>
                        <option value="Kitchen">Kitchen Renovation</option>
                        <option value="Bathroom">Bathroom Renovation</option>
                        <option value="Landscaping">Landscaping</option>
                        <option value="Misc">Miscellaneous</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="expDate" required>
                </div>
                <button type="submit" class="btn btn-primary w-full">Save Expense</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
